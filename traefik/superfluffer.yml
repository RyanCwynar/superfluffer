http:
  routers:
    superfluffer:
      rule: "Host(`superfluffer.byldr.co`)"
      service: superfluffer
      entryPoints:
        - web
        - websecure
      tls:
        certResolver: mytlschallenge

  services:
    superfluffer:
      loadBalancer:
        servers:
          - url: "http://127.0.0.1:3000"
